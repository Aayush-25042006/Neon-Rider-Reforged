<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rider: Reforged</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 450px;
        }

        #gameCanvas {
            background: linear-gradient(to bottom, #1a0b2e, #0f0f20);
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            border: 2px solid #ff00ff;
            background-image: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            text-shadow: 2px 2px 0 #ff00ff, -2px -2px 0 #00ffff;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
            font-size: 48px;
            margin: 0 0 20px 0;
        }

        .instructions {
            color: #ff00ff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        button {
            background-color: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            box-shadow: 0 0 10px #00ffff inset, 0 0 10px #00ffff;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff inset, 0 0 20px #00ffff;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="startScreen">
        <h1>NEON RIDER</h1>
        <div class="instructions">
            [↑] / [↓] : Tilt Forward / Backward<br>
            [←] / [→] : Brake / Accelerate<br>
            [ SPACE ] : Jump (Needs Ground)<br>
            [ SHIFT ] : Activate Shield (Costs 50 Pts)
        </div>
        <button id="startBtn">START ENGINE</button>
    </div>

    <div id="ui">
        <div>SCORE: <span id="scoreVal">0</span></div>
        <div style="color: #ff8c00;">SPEED LEVEL: <span id="speedVal">1</span></div>
        <div id="shieldStatus" style="color: #555;">SHIELD READY (Press SHIFT)</div>
    </div>
    <canvas id="gameCanvas" width="800" height="450"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreVal');
    const speedElement = document.getElementById('speedVal');
    const shieldStatus = document.getElementById('shieldStatus');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');

    // --- State ---
    let score = 0;
    let baseGameSpeed = 4;
    let speedLevel = 1;
    let isGameOver = false;
    let gameStarted = false;
    let animationFrameId;

    // --- Audio System ---
    let audioCtx;
    let engineOsc, engineGain;

    function initAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.value = 40; 
            engineGain.gain.value = 0.05; 
            
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        } catch (e) {
            console.log("Audio context failed to start.", e);
        }
    }

    function playCrash() {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
            engineGain.gain.value = 0; 
        } catch(e){}
    }

    // --- Input ---
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
        
        if (e.code === 'Space') {
            if (isGameOver) resetGame();
            else if (bike.grounded) {
                bike.velocityY = bike.jumpForce;
                bike.grounded = false;
            }
        }
        if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && !bike.isShielded && score >= 50 && !isGameOver) {
            bike.isShielded = true;
            score -= 50;
            updateUI();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
    });

    startBtn.addEventListener('click', () => {
        startScreen.style.display = 'none';
        initAudio();
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        gameStarted = true;
        terrain.init();
        gameLoop();
    });

    // --- Bike Physics & Rendering ---
    const bike = {
        x: 150, y: 200, w: 30, h: 15,
        velocityY: 0, velocityX: 0, rotation: 0,
        speed: 0.6, maxSpeed: 8, jumpForce: -11, // Stronger jump
        gravity: 0.5, grounded: false, isShielded: false, // Heavier gravity

        update() {
            // Apply Gravity
            this.velocityY += this.gravity;
            this.y += this.velocityY;

            // Horizontal Movement
            if (keys.ArrowRight) this.velocityX += this.speed;
            if (keys.ArrowLeft) this.velocityX -= this.speed;
            this.velocityX *= 0.9; // Friction
            
            // Clamp speed
            if (this.velocityX > this.maxSpeed) this.velocityX = this.maxSpeed;
            if (this.velocityX < -this.maxSpeed) this.velocityX = -this.maxSpeed;
            
            this.x += this.velocityX;
            if (this.x < 50) this.x = 50;
            if (this.x > canvas.width / 2) this.x = canvas.width / 2;

            // Tilt & Auto-Leveling
            if (keys.ArrowDown) this.rotation -= 0.08;
            if (keys.ArrowUp) this.rotation += 0.08;
            if (!keys.ArrowDown && !keys.ArrowUp) {
                this.rotation *= 0.90; 
            }

            // Engine sound pitching
            if (audioCtx && !isGameOver) {
                const pitch = 40 + (Math.abs(this.velocityX) * 4) + (speedLevel * 5); // Pitch scales with speed level too
                engineOsc.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.1);
            }

            this.checkCollisions();
        },

        checkCollisions() {
            this.grounded = false;
            
            // Check ground collision
            for (let i = 0; i < terrain.points.length - 1; i++) {
                const p1 = terrain.points[i];
                const p2 = terrain.points[i+1];

                if (this.x >= p1.x && this.x <= p2.x) {
                    const t = (this.x - p1.x) / (p2.x - p1.x);
                    const groundY = p1.y + t * (p2.y - p1.y);

                    if (this.y + this.h / 2 >= groundY) {
                        this.y = groundY - this.h / 2;
                        this.velocityY = 0;
                        this.grounded = true;
                        
                        // Smoothly align to slope
                        const slope = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                        this.rotation = (this.rotation * 0.7) + (slope * 0.3);
                    }
                    break;
                }
            }

            // Crash conditions: Fall below map, or rotate too far (over-rotated)
            if (this.y > canvas.height || Math.abs(this.rotation) > 2.0) {
                die();
            }
        },

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);

            if (this.isShielded) {
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#00ffff';
                ctx.stroke();
            }

            // Bike Body
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
            
            // Wheels
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(-this.w/2, this.h/2, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(this.w/2, this.h/2, 8, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    };

    // --- World & Obstacles ---
    const obstacles = [];

    const terrain = {
        points: [], segment: 20, offsetX: 0,

        init() {
            this.points = [];
            this.offsetX = 0;
            obstacles.length = 0;
            for (let x = 0; x < canvas.width + 100; x += this.segment) {
                this.points.push({ x: x, y: this.getHeight(x) });
            }
        },

        getHeight(x) {
            let base = canvas.height - 80;
            // Hills get slightly more aggressive as speed level increases
            let diff = 1 + (speedLevel * 0.1);
            return base + Math.sin(x * 0.005) * (50 * diff) + Math.sin(x * 0.015) * (15 * diff);
        },

        update() {
            const moveSpeed = baseGameSpeed + (bike.velocityX * 0.4);
            this.offsetX += moveSpeed;

            // Move terrain points
            for (let p of this.points) p.x -= moveSpeed;

            // Handle Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= moveSpeed;

                // Forgiving Hitbox
                let hitBuffer = 5; 
                
                if (obs.active && 
                    bike.x + bike.w/2 - hitBuffer > obs.x && 
                    bike.x - bike.w/2 + hitBuffer < obs.x + obs.w &&
                    bike.y + bike.h/2 - hitBuffer > obs.y && 
                    bike.y - bike.h/2 + hitBuffer < obs.y + obs.h) {
                    
                    if (bike.isShielded) {
                        obs.active = false;
                        bike.isShielded = false;
                        score += 25; 
                    } else {
                        die();
                    }
                }

                if (obs.x < -50) obstacles.splice(i, 1);
            }

            // Generate new terrain chunk
            if (this.points[0].x < -this.segment * 2) {
                this.points.shift();
                const last = this.points[this.points.length - 1];
                const newX = last.x + this.segment;
                const newY = this.getHeight(newX + this.offsetX);
                
                this.points.push({ x: newX, y: newY });
                
                // Spawn Obstacle (Chance increases slightly with speed level)
                let spawnChance = 0.04 + (speedLevel * 0.005);
                if (Math.random() < spawnChance) {
                    obstacles.push({ x: newX, y: newY - 20, w: 20, h: 20, active: true });
                }

                score++;

                // SPEED LEVEL UP LOGIC
                // Every 150 points, the game speeds up automatically
                if (score > 0 && score % 150 === 0) {
                    speedLevel++;
                    baseGameSpeed += 0.8; 
                    
                    // Cap the maximum speed so the physics engine doesn't break
                    if (baseGameSpeed > 14) baseGameSpeed = 14; 
                    
                    speedElement.innerText = speedLevel;
                }

                updateUI();
            }
        },

        draw() {
            // Draw Obstacles
            for (let obs of obstacles) {
                if (!obs.active) continue;
                ctx.fillStyle = '#ffff00';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffff00';
                ctx.beginPath();
                ctx.moveTo(obs.x + obs.w/2, obs.y);
                ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                ctx.lineTo(obs.x, obs.y + obs.h);
                ctx.fill();
            }

            // Draw Terrain Line
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(this.points[0].x, canvas.height);
            for (let p of this.points) ctx.lineTo(p.x, p.y);
            ctx.lineTo(this.points[this.points.length-1].x, canvas.height);
            ctx.fillStyle = '#2a0a4a';
            ctx.fill();
            
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff00ff';
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    };

    function updateUI() {
        scoreElement.innerText = score;
        if (bike.isShielded) {
            shieldStatus.innerText = "SHIELD ACTIVE";
            shieldStatus.style.color = "#00ffff";
        } else if (score >= 50) {
            shieldStatus.innerText = "SHIELD READY (Press SHIFT)";
            shieldStatus.style.color = "#00ffff";
        } else {
            shieldStatus.innerText = `SHIELD CHARGING... (${score}/50)`;
            shieldStatus.style.color = "#555";
        }
    }

    function die() {
        if (!isGameOver) {
            isGameOver = true;
            playCrash();
        }
    }

    function resetGame() {
        isGameOver = false;
        score = 0;
        baseGameSpeed = 4;
        speedLevel = 1;
        speedElement.innerText = speedLevel;
        bike.y = 100;
        bike.velocityY = 0;
        bike.rotation = 0;
        bike.velocityX = 0;
        bike.isShielded = false;
        terrain.init();
        updateUI();
        
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        if (engineGain) engineGain.gain.value = 0.05;
    }

    function drawScenery() {
        ctx.fillStyle = '#ff8c00';
        ctx.shadowBlur = 40;
        ctx.shadowColor = '#ff8c00';
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height - 120, 80, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Sun Grid
        ctx.fillStyle = '#0f0f20';
        for(let i=0; i<6; i++) {
            ctx.fillRect(canvas.width/2 - 90, canvas.height - 130 + (i*15), 180, 3);
        }
    }

    // --- Main Loop ---
    function gameLoop() {
        if (!gameStarted) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (isGameOver) {
            drawScenery();
            terrain.draw();
            bike.draw();
            
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#ff00ff';
            ctx.font = 'bold 40px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('CRASHED!', canvas.width/2, canvas.height/2 - 30);
            ctx.fillStyle = '#00ffff';
            ctx.font = '20px Courier New';
            ctx.fillText(`FINAL SCORE: ${score}`, canvas.width/2, canvas.height/2 + 10);
            ctx.fillText(`SPEED LEVEL: ${speedLevel}`, canvas.width/2, canvas.height/2 + 40);
            ctx.fillText('Press [SPACE] to Restart', canvas.width/2, canvas.height/2 + 80);
            
            animationFrameId = requestAnimationFrame(gameLoop);
            return;
        }

        drawScenery();
        terrain.update();
        terrain.draw();
        bike.update();
        bike.draw();

        animationFrameId = requestAnimationFrame(gameLoop);
    }
</script>

</body>
</html>
